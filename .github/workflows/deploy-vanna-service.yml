name: Deploy Vanna Chatbot Service to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'vanna_service/**'
      - '.github/workflows/deploy-vanna-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare deployment package
        run: |
          cp vanna_service/requirements.txt requirements.txt
          zip -r deploy.zip vanna_service/ requirements.txt -x "vanna_service/.venv/*" "vanna_service/__pycache__/*"

      - name: Deploy via Kudu zip deploy
        env:
          SCM_CREDENTIALS: ${{ secrets.AZURE_VANNA_SCM_CREDENTIALS }}
        run: |
          curl -s -X POST \
            -u "$SCM_CREDENTIALS" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://intex-vanna.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "\nHTTP Status: %{http_code}\n"
