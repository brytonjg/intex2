name: Deploy AI Harness to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ai_harness/**'
      - '.github/workflows/deploy-ai-harness.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare deployment package
        run: |
          cp ai_harness/requirements.txt requirements.txt
          zip -r deploy.zip ai_harness/ requirements.txt -x "ai_harness/.venv/*" "ai_harness/__pycache__/*" "ai_harness/tests/*"

      - name: Deploy via Kudu zip deploy
        env:
          SCM_CREDENTIALS: ${{ secrets.AZURE_AI_HARNESS_SCM_CREDENTIALS }}
        run: |
          curl -s -X POST \
            -u "$SCM_CREDENTIALS" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://intex-ai-harness.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "\nHTTP Status: %{http_code}\n"
